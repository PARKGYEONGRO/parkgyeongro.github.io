<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 빅데이터·AI 전공 마스터 챗봇 📊</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #f8fafc;
        }

        .chat-container {
            width: 500px;
            height: 750px;
            background-color: #1e293b;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), 0 0 15px rgba(56, 189, 248, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #334155;
        }

        .chat-header {
            background: linear-gradient(90deg, #0284c7, #3b82f6);
            color: white;
            padding: 20px;
            font-size: 1.25rem;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .chat-sub-header {
            font-size: 0.8rem;
            font-weight: normal;
            opacity: 0.8;
            margin-top: 4px;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background-color: #0f172a;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .message-content {
            padding: 14px 18px;
            border-radius: 16px;
            max-width: 85%;
            font-size: 0.95rem;
            line-height: 1.6;
            word-break: keep-all;
        }

        .user-message {
            align-items: flex-end;
        }

        .user-message .message-content {
            background-color: #38bdf8;
            color: #0f172a;
            font-weight: bold;
            border-bottom-right-radius: 2px;
        }

        .bot-message {
            align-items: flex-start;
        }

        .bot-message .message-content {
            background-color: #1e293b;
            color: #e2e8f0;
            border-bottom-left-radius: 2px;
            border: 1px solid #334155;
        }

        /* 🤖 챗봇 내부 출력 이미지 스타일 */
        .message-image {
            margin-top: 12px;
            max-width: 100%;
            border-radius: 8px;
            border: 1px solid #475569;
            display: block;
        }

        /* 추천 질문 선택 영역 */
        .preset-questions {
            padding: 12px 15px;
            background-color: #1e293b;
            border-top: 1px solid #334155;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
        }

        .preset-title {
            font-size: 0.85rem;
            color: #38bdf8;
            font-weight: bold;
        }

        .preset-buttons {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 150px; /* 충분한 리스트 공간 제공 */
            overflow-y: auto;   /* 넘칠 경우 스크롤 제공 */
            padding-right: 4px;
        }

        .preset-btn {
            background-color: #0f172a;
            color: #94a3b8;
            border: 1px solid #334155;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-size: 0.88rem;
            line-height: 1.4;
            transition: all 0.2s;
            white-space: normal;  /* 텍스트 줄바꿈 보장 */
            word-break: keep-all; /* 단어 단위 파괴 방지 */
            flex-shrink: 0;       /* 부모 압착에 의한 찌그러짐 방지 */
        }

        .preset-btn:hover {
            background-color: #1e293b;
            color: #38bdf8;
            border-color: #38bdf8;
        }

        /* 하단 입력창 및 파일 업로드 영역 */
        .chat-input-area {
            padding: 15px;
            background-color: #1e293b;
            border-top: 1px solid #334155;
            display: flex;
            gap: 10px;
        }

        .file-input-wrapper {
            display: flex;
            align-items: center;
        }

        .file-label {
            background-color: #334155;
            color: #e2e8f0;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            transition: background 0.2s;
            white-space: nowrap;
            border: 1px solid #475569;
        }

        .file-label:hover {
            background-color: #475569;
        }

        #csvFileInput {
            display: none;
        }

        .chat-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: white;
            border-radius: 8px;
            outline: none;
            font-size: 0.95rem;
        }

        .chat-input:focus {
            border-color: #38bdf8;
        }

        .send-btn {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 0 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .send-btn:hover {
            background-color: #2563eb;
        }
        
        .chat-messages::-webkit-scrollbar, .preset-buttons::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-thumb, .preset-buttons::-webkit-scrollbar-thumb {
            background-color: #475569;
            border-radius: 3px;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        📊 빅데이터·AI 전공 헬퍼 챗봇
        <div class="chat-sub-header">중요 개념 및 헷갈리는 전공 용어 완벽 정리</div>
    </div>
    
    <div class="chat-messages" id="chatMessages">
        <div class="message bot-message">
            <div class="message-content">안녕하세요! 빅데이터 및 AI 전공자들을 위한 개념 마스터 챗봇입니다. 🤖<br><br>하단의 주요 전공 고민/질문 목록을 선택하시면 상세한 용어 정리와 개념을 파악할 수 있는 시각자료를 매칭해 드립니다. 직접 작성한 CSV 파일을 업로드하여 리스트를 자유롭게 바꿀 수도 있습니다.</div>
        </div>
    </div>
    
    <div class="preset-questions">
        <div class="preset-title">💡 자주 묻는 전공 질문 (눌러서 답변 확인)</div>
        <div class="preset-buttons" id="presetButtons">
            </div>
    </div>
    
    <div class="chat-input-area">
        <div class="file-input-wrapper">
            <label for="csvFileInput" class="file-label">CSV 로드</label>
            <input type="file" id="csvFileInput" accept=".csv" onchange="loadCSV(event)">
        </div>
        <input type="text" id="chatInput" class="chat-input" placeholder="전공 용어를 검색하거나 목록을 선택하세요..." onkeypress="handleKeyPress(event)">
        <button class="send-btn" onclick="sendMessage()">전송</button>
    </div>
</div>

<script>
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const presetButtons = document.getElementById('presetButtons');

    // 탑재된 10대 핵심 인공지능 / 빅데이터 전공 용어 DB
    let qaDatabase = {
        "인공지능(AI)과 머신러닝(ML), 딥러닝(DL)의 차이점은 무엇인가요?": {
            answer: "AI는 인간의 지능을 모방하는 광범위한 기술이며, 머신러닝은 데이터로부터 학습하는 AI의 하위 집합입니다. 딥러닝은 인간의 뇌 신경망을 모방한 인공신경망(ANN)을 사용하는 머신러닝의 특수한 분야입니다. 구조적으로는 AI > ML > DL 포함 관계를 가집니다.",
            image: "https://images.unsplash.com/photo-1620712943543-bcc4688e7485?w=600&auto=format&fit=crop"
        },
        "지도학습(Supervised)과 비지도학습(Unsupervised)의 핵심 차이는?": {
            answer: "가장 큰 차이는 데이터에 '정답(Label)'이 있느냐 없느냐입니다. 지도학습은 정답이 있는 데이터를 주고 예측/분류를 학습시키는 반면(예: 스팸 메일 분류), 비지도학습은 정답 없이 데이터 자체의 패턴이나 구조를 파악하여 그룹화합니다(예: 고객 군집 분석).",
            image: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=600&auto=format&fit=crop"
        },
        "과적합(Overfitting)이란 무엇이며 어떻게 해결하나요?": {
            answer: "모델이 훈련 데이터에 너무 과하게 맞춰져서 새로운 데이터(테스트 데이터)에서는 예측 성능이 크게 떨어지는 현상입니다. 해결 방법으로는 데이터 양 늘리기, 모델 복잡도 줄이기, 규제(Regularization; L1/L2) 적용, 드롭아웃(Dropout) 사용 등이 있습니다.",
            image: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=600&auto=format&fit=crop"
        },
        "빅데이터의 5V 특성이 무엇인가요?": {
            answer: "빅데이터의 주요 특징을 나타내는 5가지 요소입니다. 규모(Volume), 속도(Velocity), 다양성(Variety)의 핵심 3V에 더해 데이터의 신뢰성을 뜻하는 정확성(Veracity), 그리고 경제적 유용성을 뜻하는 가치(Value)가 포함됩니다.",
            image: "https://images.unsplash.com/photo-1544383835-bda2bc66a55d?w=600&auto=format&fit=crop"
        },
        "하두프(Hadoop)와 스파크(Spark)의 가장 큰 차이점은?": {
            answer: "하두프는 디스크 기반(MapReduce)으로 데이터를 처리하여 대용량 저장과 안정성에 강점이 있지만 속도가 상대적으로 느립니다. 반면, 스파크는 메모리 내부(In-Memory)에서 데이터를 처리하므로 하두프보다 연산 속도가 수십~백 배 빠르며 실시간 데이터 스트리밍 처리에 유리합니다.",
            image: "https://images.unsplash.com/photo-1515879218367-8466d910aaa4?w=600&auto=format&fit=crop"
        },
        "분류 성능 지표 중 정밀도(Precision)와 재현율(Recall)의 차이는?": {
            answer: "정밀도는 모델이 '참'이라고 예측한 것 중 실제 '참'인 비율입니다(스팸 메일 차단 등 중요). 재현율은 '실제 참'인 것 중 모델이 참이라고 '적중'한 비율입니다(암 진단, 범죄 예측 등 놓치면 안 되는 상황에 중요). 둘은 트레이드오프 관계에 있습니다.",
            image: "https://images.unsplash.com/photo-1504868584819-f8e8b4b6d7e3?w=600&auto=format&fit=crop"
        },
        "정형 데이터, 반정형 데이터, 비정형 데이터의 차이는?": {
            answer: "정형 데이터는 RDBMS 테이블처럼 고정된 구조에 정제된 데이터(CSV, SQL)입니다. 반정형 데이터는 고정된 스키마는 없으나 형태가 있는 데이터(JSON, XML)입니다. 비정형 데이터는 구조가 전혀 없는 텍스트, 이미지, 오디오, 영상 데이터입니다.",
            image: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=600&auto=format&fit=crop"
        },
        "데이터 사이언스에서 차원의 저주(Curse of Dimensionality)란?": {
            answer: "데이터의 피처(변수) 수가 늘어남에 따라 공간의 차원이 커지면서, 데이터가 채우는 밀도가 급격히 낮아져 모델 학습 성능이 저하되는 현상입니다. 이를 해결하기 위해 PCA(주성분 분석) 같은 차원 축소 알고리즘을 사용합니다.",
            image: "https://images.unsplash.com/photo-1509228468518-180dd4864904?w=600&auto=format&fit=crop"
        },
        "데이터 불균형(Data Imbalance) 문제는 어떻게 해결하나요?": {
            answer: "특정 클래스의 데이터 수가 너무 적어 모델이 다수 클래스 위주로 학습하는 문제입니다. 다수 클래스를 줄이는 언더샘플링, 소수 클래스를 가상으로 합성 및 증식시키는 오버샘플링(SMOTE), 혹은 평가지표를 Accuracy 대신 F1-score/AUC로 설정해 해결합니다.",
            image: "https://images.unsplash.com/photo-1532187863486-abf9d39d6618?w=600&auto=format&fit=crop"
        },
        "자연어 처리(NLP)에서 임베딩(Embedding)이란 무엇인가요?": {
            answer: "컴퓨터가 텍스트를 이해할 수 있도록 단어나 문장을 고차원의 수치 벡터(Vector) 공간에 매핑하는 기술입니다. 단어의 의미적 유사성을 컴퓨터가 수학적으로 연산(예: '왕' - '남자' + '여자' = '여왕')할 수 있게 해줍니다.",
            image: "https://images.unsplash.com/photo-1614064641938-3bbee52942c7?w=600&auto=format&fit=crop"
        }
    };

    function renderPresetButtons() {
        presetButtons.innerHTML = '';
        for (let question in qaDatabase) {
            const btn = document.createElement('button');
            btn.className = 'preset-btn';
            btn.innerText = question;
            btn.onclick = function() { clickQuestion(this); };
            presetButtons.appendChild(btn);
        }
    }

    function loadCSV(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const text = e.target.result;
            parseCSV(text);
        };
        reader.readAsText(file, "utf-8"); 
    }

    function parseCSV(text) {
        const lines = text.split(/\r?\n/);
        const newDatabase = {};

        for (let i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue;
            
            let matches = lines[i].match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || lines[i].split(',');
            if (matches.length >= 2) {
                let question = matches[0].replace(/^"(.*)"$/, '$1').trim();
                let answer = matches[1].replace(/^"(.*)"$/, '$1').trim();
                let image = matches[2] ? matches[2].replace(/^"(.*)"$/, '$1').trim() : "";
                
                newDatabase[question] = { answer: answer, image: image };
            }
        }

        if (Object.keys(newDatabase).length > 0) {
            qaDatabase = newDatabase;
            renderPresetButtons();
            appendMessage("📌 전공 데이터 CSV가 성공적으로 적용되어 리스트가 업데이트되었습니다!", "bot-message");
        }
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }

    function clickQuestion(button) {
        chatInput.value = button.innerText;
        sendMessage();
    }

    function sendMessage() {
        const messageText = chatInput.value.trim();
        if (messageText === '') return;

        appendMessage(messageText, 'user-message');
        chatInput.value = '';

        setTimeout(() => {
            const botResponse = getBotResponse(messageText);
            appendMessage(botResponse.answer, 'bot-message', botResponse.image);
        }, 400);
    }

    function appendMessage(text, className, imageUrl = "") {
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message', className);

        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';
        contentDiv.innerHTML = text.replace(/\n/g, '<br>');

        if (imageUrl) {
            const img = document.createElement('img');
            img.src = imageUrl;
            img.className = 'message-image';
            img.alt = '전공 시각화 이미지';
            img.onerror = function() { this.style.display = 'none'; }; 
            contentDiv.appendChild(img);
        }

        messageDiv.appendChild(contentDiv);
        chatMessages.appendChild(messageDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // 고도화된 질문/답변 매칭 로직 (대안 질문 및 키워드 기반)
    function getBotResponse(userMessage) {
        const cleanUserMsg = userMessage.toLowerCase().replace(/\s+/g, ''); // 공백 제거 및 소문자화로 매칭률 향상
    
        // 1단계: 완전 일치 검사
        if (qaDatabase[userMessage]) {
            return qaDatabase[userMessage];
        }
    
        // 2단계: 질문은 다르지만 같은 답변을 해야 하는 유사 표현/키워드 매칭 매핑 데이터
        // 질문의 핵심 키워드를 트리거로 설정하여 동일한 답변 객체를 반환합니다.
        const 의도별_키워드_맵 = [
            {
                keywords: ['ai', '머신러닝', '딥러닝', '차이', '관계', '포함', 'ml', 'dl', '인공지능'],
                targetQuestion: "인공지능(AI)과 머신러닝(ML), 딥러닝(DL)의 차이점은 무엇인가요?"
            },
            {
                keywords: ['지도', '비지도', '레이블', '정답', '라벨', 'supervised', 'unsupervised'],
                targetQuestion: "지도학습(Supervised)과 비지도학습(Unsupervised)의 핵심 차이는?"
            },
            {
                keywords: ['과적합', '오버피팅', 'overfitting', '테스트데이터', '드롭아웃', '규제'],
                targetQuestion: "과적합(Overfitting)이란 무엇이며 어떻게 해결하나요?"
            },
            {
                keywords: ['5v', '빅데이터특징', 'v3', 'volume', 'velocity', 'variety'],
                targetQuestion: "빅데이터의 5V 특성이 무엇인가요?"
            },
            {
                keywords: ['하두프', '스파크', 'hadoop', 'spark', '맵리듀스', '인메모리', '디스크기반'],
                targetQuestion: "하두프(Hadoop)와 스파크(Spark)의 가장 큰 차이점은?"
            },
            {
                keywords: ['정밀도', '재현율', 'precision', 'recall', '트레이드오프', 'f1'],
                targetQuestion: "분류 성능 지표 중 정밀도(Precision)와 재현율(Recall)의 차이는?"
            },
            {
                keywords: ['정형', '반정형', '비정형', 'json', 'xml', 'csv', '텍스트이미지'],
                targetQuestion: "정형 데이터, 반정형 데이터, 비정형 데이터의 차이는?"
            },
            {
                keywords: ['차원의저주', '차원축소', 'pca', '피처', '변수개수', 'dimensionality'],
                targetQuestion: "데이터 사이언스에서 차원의 저주(Curse of Dimensionality)란?"
            },
            {
                keywords: ['불균형', 'imbalance', 'smote', '오버샘플링', '언더샘플링'],
                targetQuestion: "데이터 불균형(Data Imbalance) 문제는 어떻게 해결하나요?"
            },
            {
                keywords: ['임베딩', 'embedding', '벡터', 'vector', '자연어', 'nlp'],
                targetQuestion: "자연어 처리(NLP)에서 임베딩(Embedding)이란 무엇인가요?"
            }
        ];
        
        // 사용자의 입력 문장에 설정된 키워드들이 많이 포함되어 있는지 매칭 점수 계산
        let bestMatchQuestion = null;
        let maxScore = 0;
        
        for (let item of 의도별_키워드_맵) {
            let score = 0;
            for (let keyword of item.keywords) {
                if (userMessage.toLowerCase().includes(keyword)) {
                    score++; // 키워드가 포함될 때마다 매칭 점수 +1
                }
            }
            // 가장 연관성이 높은(점수가 높은) 질문을 후보로 선정 (최소 1개 이상 매칭 시)
            if (score > maxScore) {
                maxScore = score;
                bestMatchQuestion = item.targetQuestion;
            }
        }
    
        // 유사 키워드 조건에 부합하는 질문을 찾았다면 해당 답변 반환
        if (bestMatchQuestion && qaDatabase[bestMatchQuestion]) {
            return qaDatabase[bestMatchQuestion];
        }
    
        // 3단계: 기본 루프 매칭 (기존 로직 유지 - 질문 문자열 자체에 포함 관계가 있을 때)
        for (let question in qaDatabase) {
            const cleanQuestion = question.toLowerCase().replace(/\s+/g, '');
            if (cleanUserMsg.includes(cleanQuestion) || cleanQuestion.includes(cleanUserMsg)) {
                return qaDatabase[question];
            }
        }
    
        // 일치하는 항목이 없을 때
        return {
            answer: "죄송합니다. 입력하신 단어나 질문과 매칭되는 전공 지식을 찾지 못했습니다. 아래 목록의 추천 질문을 이용하시거나 단어 위주(예: '하두프', '과적합')로 다시 검색해 보세요! 💡",
            image: ""
        };
    }

    renderPresetButtons();
</script>
